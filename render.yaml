services:
  - type: web
    name: devops-incident-resolver-api
    env: python
    plan: free
    rootDir: .
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -e .
    startCommand: uvicorn devops_resolver.presentation.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DIR_ENVIRONMENT
        value: production
      - key: DIR_LOG_LEVEL
        value: INFO
      - key: DIR_LLM_PROVIDER
        value: local
      - key: DIR_USE_MOCK_LLM
        value: "true"
      - key: DIR_CORS_ORIGINS
        value: '["https://your-vercel-app.vercel.app"]'
